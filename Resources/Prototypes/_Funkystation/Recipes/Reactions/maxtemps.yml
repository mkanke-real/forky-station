- type: reaction
  id: PlasmaGasOff
  minTemp: 500
  reactants:
    Plasma:
      amount: 1
  effects:
  - !type:CreateGas
    gas: Plasma
  - !type:PopupMessage
    visualType: LargeCaution
    messages: [ "reagent-gas-created" ]
    type: Pvs

